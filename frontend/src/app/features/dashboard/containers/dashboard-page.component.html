<section class="space-y-6">
  <app-page-header
    title="Dashboard"
    [description]="'Operational overview of campaign performance · Filter: ' + viewState().activeFilter">
  </app-page-header>

  <div class="grid gap-4 md:grid-cols-3">
    <app-kpi-card
      *ngFor="let kpi of kpis()"
      [title]="kpi.title"
      [value]="kpi.value"></app-kpi-card>
  </div>

  <app-entity-table title="Click Trend (Daily)" [rows]="trendRows()"></app-entity-table>
</section>
