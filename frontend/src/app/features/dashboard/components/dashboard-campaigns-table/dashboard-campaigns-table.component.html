<p-card header="Campaign performance">
  <p-table
    #dashboardTable
    [value]="rows"
    [rows]="5"
    [paginator]="true"
    responsiveLayout="scroll"
    [rowHover]="true"
    dataKey="name"
    [globalFilterFields]="['name', 'owner', 'status', 'templateType']"
    sortField="endDate"
    [sortOrder]="-1">
    <ng-template pTemplate="caption">
      <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
        <div>
          <h3 class="text-base font-semibold text-slate-900">Filterable campaign table</h3>
          <p class="text-sm text-slate-500">Track campaign owner, status, and click rates from one operational view.</p>
        </div>

        <div class="flex flex-col gap-2 sm:flex-row">
          <span class="p-input-icon-left">
            <i class="pi pi-search"></i>
            <input
              pInputText
              type="text"
              placeholder="Search name/owner/template"
              (input)="applyGlobalFilter($event, dashboardTable)" />
          </span>

          <p-dropdown
            [options]="statuses"
            [showClear]="true"
            placeholder="Filter by status"
            (onChange)="applyStatusFilter($event.value, dashboardTable)"></p-dropdown>
        </div>
      </div>
    </ng-template>

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="name">Campaign <p-sortIcon field="name"></p-sortIcon></th>
        <th pSortableColumn="owner">Owner <p-sortIcon field="owner"></p-sortIcon></th>
        <th pSortableColumn="status">Status <p-sortIcon field="status"></p-sortIcon></th>
        <th pSortableColumn="templateType">Template <p-sortIcon field="templateType"></p-sortIcon></th>
        <th pSortableColumn="startDate">Start <p-sortIcon field="startDate"></p-sortIcon></th>
        <th pSortableColumn="endDate">End <p-sortIcon field="endDate"></p-sortIcon></th>
        <th pSortableColumn="clickRate">Click rate <p-sortIcon field="clickRate"></p-sortIcon></th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-row>
      <tr>
        <td class="font-medium text-slate-800">{{ row.name }}</td>
        <td>{{ row.owner }}</td>
        <td><p-tag [value]="row.status" [severity]="statusSeverity(row.status)"></p-tag></td>
        <td>{{ row.templateType }}</td>
        <td>{{ row.startDate }}</td>
        <td>{{ row.endDate }}</td>
        <td>{{ row.clickRate }}%</td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
