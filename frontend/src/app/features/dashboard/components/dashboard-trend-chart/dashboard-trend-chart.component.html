<p-card [header]="title">
  <div class="space-y-4">
    <p class="text-sm text-slate-500 dark:text-slate-400">Daily click distribution for active dashboard scope.</p>

    <ng-container *ngIf="points.length > 0; else emptyTrendState">
      <div class="grid h-56 grid-cols-7 items-end gap-3 rounded-lg border border-slate-200 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-800/40" role="list" aria-label="Daily click trend chart">
        <div *ngFor="let point of points" class="flex h-full flex-col items-center justify-end gap-2" role="listitem">
          <div
            class="w-full rounded-t-md bg-sky-500/80 transition-all duration-300"
            [style.height.%]="(point.clicks / maxClicks()) * 100"
            [attr.aria-label]="point.day + ' clicks ' + point.clicks"></div>
          <div class="text-xs font-semibold text-slate-600 dark:text-slate-300">{{ point.day }}</div>
          <div class="text-xs text-slate-500 dark:text-slate-400">{{ point.clicks }}</div>
        </div>
      </div>
    </ng-container>

    <ng-template #emptyTrendState>
      <div class="rounded-lg border border-dashed border-slate-300 p-6 text-center text-sm text-slate-500 dark:border-slate-600 dark:text-slate-400">
        No trend points available.
      </div>
    </ng-template>
  </div>
</p-card>
