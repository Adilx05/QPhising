<p-card [header]="title">
  <p-table [value]="rows" responsiveLayout="scroll">
    <ng-template pTemplate="header">
      <tr>
        <th class="capitalize" *ngFor="let column of (rows[0] ? (rows[0] | keyvalue) : [])">{{ column.key }}</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-row>
      <tr>
        <td *ngFor="let column of row | keyvalue">{{ column.value }}</td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td class="py-6 text-center text-sm text-slate-500 dark:text-slate-400" [attr.colspan]="rows[0] ? (rows[0] | keyvalue).length : 1">
          No records available for the selected scope.
        </td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
