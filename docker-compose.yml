name: qphising

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    profiles: ["redis"]

  api:
    build:
      context: .
      dockerfile: backend/API/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__DefaultConnection: ${API_CONNECTION_STRING:-Host=host.docker.internal;Port=5432;Database=mydatabase;Username=myuser;Password=mypassword}
      Authentication__Jwt__Authority: ${JWT_AUTHORITY:-http://host.docker.internal:6060/realms/QPhising}
      Authentication__Jwt__Audience: ${JWT_AUDIENCE:-account}
      Authentication__Jwt__RequireHttpsMetadata: ${JWT_REQUIRE_HTTPS_METADATA:-false}
      Redis__Configuration: ${REDIS_CONFIGURATION:-redis:6379}
      Redis__InstanceName: ${REDIS_INSTANCE_NAME:-QPhising}
      FeatureFlags__SwaggerEnabled: ${API_SWAGGER_ENABLED:-true}
      Database__ApplyMigrationsOnStartup: ${API_APPLY_MIGRATIONS_ON_STARTUP:-true}
      Tracking__VisitorPrivacy__HashPepper: ${TRACKING_HASH_PEPPER:-}
      Setup__AllowRuntimeOverrides: ${SETUP_ALLOW_RUNTIME_OVERRIDES:-false}
    ports:
      - "${API_PORT:-5050}:5050"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5050/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  gateway:
    build:
      context: .
      dockerfile: backend/Gateway/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      Authentication__Jwt__Authority: ${JWT_AUTHORITY:-http://host.docker.internal:6060/realms/QPhising}
      Authentication__Jwt__Audience: ${JWT_AUDIENCE:-account}
      Authentication__Jwt__RequireHttpsMetadata: ${JWT_REQUIRE_HTTPS_METADATA:-false}
      Gateway__RoutePolicies__ForwardAccessToken: ${GATEWAY_FORWARD_ACCESS_TOKEN:-true}
      HealthChecks__DownstreamApi__Host: ${GATEWAY_DOWNSTREAM_API_HOST:-api}
      HealthChecks__DownstreamApi__Port: ${GATEWAY_DOWNSTREAM_API_PORT:-5050}
      HealthChecks__DownstreamApi__Scheme: ${GATEWAY_DOWNSTREAM_API_SCHEME:-http}
      Setup__AllowRuntimeOverrides: ${SETUP_ALLOW_RUNTIME_OVERRIDES:-false}
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    build:
      context: frontend/
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
    environment:
      QPHISING_API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://localhost:8080}
      QPHISING_AUTHORITY: ${FRONTEND_AUTHORITY:-http://localhost:6060}
      QPHISING_REALM: ${FRONTEND_REALM:-QPhising}
      QPHISING_CLIENT_ID: ${FRONTEND_CLIENT_ID:-qphising}
      QPHISING_AUTH_SCOPE: ${FRONTEND_AUTH_SCOPE:-openid profile email}
      QPHISING_AUTH_REDIRECT_URI: ${FRONTEND_AUTH_REDIRECT_URI:-http://localhost:4200/auth/callback}
      QPHISING_POST_LOGOUT_REDIRECT_URI: ${FRONTEND_POST_LOGOUT_REDIRECT_URI:-http://localhost:4200/auth/unauthorized}
    ports:
      - "${FRONTEND_PORT:-4200}:80"
