version: '3.9'

services:

  postgres:
    image: postgres:15
    container_name: qphising-postgres
    restart: always
    environment:
      POSTGRES_DB: qphising
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: qphising-redis
    ports:
      - "6379:6379"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: qphising-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"

  api:
    build: ./backend
    container_name: qphising-api
    depends_on:
      - postgres
      - redis
    ports:
      - "5000:8080"

  gateway:
    build: ./gateway
    container_name: qphising-gateway
    depends_on:
      - api
    ports:
      - "5001:8080"

  frontend:
    build: ./frontend
    container_name: qphising-frontend
    ports:
      - "4200:80"
    depends_on:
      - gateway

volumes:
  pgdata:
