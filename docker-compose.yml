version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: qphising-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qphising}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-qphising}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7
    container_name: qphising-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: qphising-keycloak
    command: ["start-dev", "--http-port=8080"]
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qphising-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${API_ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      Database__ConnectionString: Host=${POSTGRES_HOST:-postgres};Port=5432;Database=${POSTGRES_DB:-qphising};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Redis__ConnectionString: ${REDIS_HOST:-redis}:6379
      Redis__TrackingDeduplicationWindowMinutes: ${REDIS_TRACKING_DEDUPLICATION_WINDOW_MINUTES:-15}
      Redis__TrackingTokenClockSkewSeconds: ${REDIS_TRACKING_TOKEN_CLOCK_SKEW_SECONDS:-30}
      Redis__TrackingAbuseWindowMinutes: ${REDIS_TRACKING_ABUSE_WINDOW_MINUTES:-1}
      Redis__TrackingSuspiciousIpThreshold: ${REDIS_TRACKING_SUSPICIOUS_IP_THRESHOLD:-20}
      Redis__TrackingIpRejectionThreshold: ${REDIS_TRACKING_IP_REJECTION_THRESHOLD:-50}
      Redis__TrackingAggregateRetentionDays: ${REDIS_TRACKING_AGGREGATE_RETENTION_DAYS:-365}
      Redis__AnalyticsDashboardCacheTtlSeconds: ${REDIS_ANALYTICS_DASHBOARD_CACHE_TTL_SECONDS:-300}
      TrackingRetention__RawClickRetentionDays: ${TRACKING_RETENTION_RAW_CLICK_DAYS:-90}
      TrackingRetention__AggregateRetentionDays: ${TRACKING_RETENTION_AGGREGATE_DAYS:-365}
      TrackingRetention__CleanupIntervalMinutes: ${TRACKING_RETENTION_CLEANUP_INTERVAL_MINUTES:-60}
      TrackingRetention__CleanupBatchSize: ${TRACKING_RETENTION_CLEANUP_BATCH_SIZE:-1000}
      TrackingTokens__SigningKey: ${TRACKING_TOKENS_SIGNING_KEY:-qphising-local-dev-signing-key-please-change-2026}
      TrackingTokens__ExpirationMinutes: ${TRACKING_TOKENS_EXPIRATION_MINUTES:-30}
      TrackingTokens__Version: ${TRACKING_TOKENS_VERSION:-1}
      ExportStorage__BasePath: ${EXPORT_STORAGE_BASE_PATH:-/tmp/qphising-exports}
      ExportStorage__FileTtlDays: ${EXPORT_STORAGE_FILE_TTL_DAYS:-7}
      ExportRetention__CleanupIntervalMinutes: ${EXPORT_RETENTION_CLEANUP_INTERVAL_MINUTES:-60}
      ExportRetention__CleanupBatchSize: ${EXPORT_RETENTION_CLEANUP_BATCH_SIZE:-250}
      Keycloak__Authority: ${KEYCLOAK_AUTHORITY:-http://keycloak:8080/realms/qphising}
      Keycloak__Audience: ${KEYCLOAK_AUDIENCE:-qphising-api}
      Keycloak__RequireHttpsMetadata: ${KEYCLOAK_REQUIRE_HTTPS_METADATA:-false}
      Smtp__Host: ${SMTP_HOST:-mailhog}
      Smtp__Port: ${SMTP_PORT:-1025}
      Smtp__Username: ${SMTP_USERNAME:-qphising}
      Smtp__Password: ${SMTP_PASSWORD:-qphising}
      Smtp__FromAddress: ${SMTP_FROM_ADDRESS:-no-reply@qphising.local}
      Smtp__UseSsl: ${SMTP_USE_SSL:-false}
      BaseUrls__Gateway: ${BASE_URL_GATEWAY:-http://gateway:8080}
      BaseUrls__Frontend: ${BASE_URL_FRONTEND:-http://frontend}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "${API_PORT:-5000}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: qphising-worker
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${WORKER_ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      Database__ConnectionString: Host=${POSTGRES_HOST:-postgres};Port=5432;Database=${POSTGRES_DB:-qphising};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Redis__ConnectionString: ${REDIS_HOST:-redis}:6379
      Redis__TrackingDeduplicationWindowMinutes: ${REDIS_TRACKING_DEDUPLICATION_WINDOW_MINUTES:-15}
      Redis__TrackingTokenClockSkewSeconds: ${REDIS_TRACKING_TOKEN_CLOCK_SKEW_SECONDS:-30}
      Redis__TrackingAbuseWindowMinutes: ${REDIS_TRACKING_ABUSE_WINDOW_MINUTES:-1}
      Redis__TrackingSuspiciousIpThreshold: ${REDIS_TRACKING_SUSPICIOUS_IP_THRESHOLD:-20}
      Redis__TrackingIpRejectionThreshold: ${REDIS_TRACKING_IP_REJECTION_THRESHOLD:-50}
      Redis__TrackingAggregateRetentionDays: ${REDIS_TRACKING_AGGREGATE_RETENTION_DAYS:-365}
      TrackingRetention__RawClickRetentionDays: ${TRACKING_RETENTION_RAW_CLICK_DAYS:-90}
      TrackingRetention__AggregateRetentionDays: ${TRACKING_RETENTION_AGGREGATE_DAYS:-365}
      TrackingRetention__CleanupIntervalMinutes: ${TRACKING_RETENTION_CLEANUP_INTERVAL_MINUTES:-60}
      TrackingRetention__CleanupBatchSize: ${TRACKING_RETENTION_CLEANUP_BATCH_SIZE:-1000}
      TrackingTokens__SigningKey: ${TRACKING_TOKENS_SIGNING_KEY:-qphising-local-dev-signing-key-please-change-2026}
      TrackingTokens__ExpirationMinutes: ${TRACKING_TOKENS_EXPIRATION_MINUTES:-30}
      TrackingTokens__Version: ${TRACKING_TOKENS_VERSION:-1}
      ExportStorage__BasePath: ${EXPORT_STORAGE_BASE_PATH:-/tmp/qphising-exports}
      ExportStorage__FileTtlDays: ${EXPORT_STORAGE_FILE_TTL_DAYS:-7}
      ExportRetention__CleanupIntervalMinutes: ${EXPORT_RETENTION_CLEANUP_INTERVAL_MINUTES:-60}
      ExportRetention__CleanupBatchSize: ${EXPORT_RETENTION_CLEANUP_BATCH_SIZE:-250}
      TaskWorker__PollIntervalSeconds: ${TASK_WORKER_POLL_INTERVAL_SECONDS:-5}
      TaskWorker__ClaimLeaseDurationSeconds: ${TASK_WORKER_CLAIM_LEASE_DURATION_SECONDS:-60}
      TaskWorker__InitialRetryDelaySeconds: ${TASK_WORKER_INITIAL_RETRY_DELAY_SECONDS:-5}
      TaskWorker__MaxRetryDelaySeconds: ${TASK_WORKER_MAX_RETRY_DELAY_SECONDS:-300}
      TaskWorker__RetryBackoffMultiplier: ${TASK_WORKER_RETRY_BACKOFF_MULTIPLIER:-2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${WORKER_PORT:-5002}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: qphising-gateway
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${GATEWAY_ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      Database__ConnectionString: Host=${POSTGRES_HOST:-postgres};Port=5432;Database=${POSTGRES_DB:-qphising};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Redis__ConnectionString: ${REDIS_HOST:-redis}:6379
      Keycloak__Authority: ${KEYCLOAK_AUTHORITY:-http://keycloak:8080/realms/qphising}
      Keycloak__Audience: ${KEYCLOAK_AUDIENCE:-qphising-api}
      Keycloak__RequireHttpsMetadata: ${KEYCLOAK_REQUIRE_HTTPS_METADATA:-false}
      Smtp__Host: ${SMTP_HOST:-mailhog}
      Smtp__Port: ${SMTP_PORT:-1025}
      Smtp__Username: ${SMTP_USERNAME:-qphising}
      Smtp__Password: ${SMTP_PASSWORD:-qphising}
      Smtp__FromAddress: ${SMTP_FROM_ADDRESS:-no-reply@qphising.local}
      Smtp__UseSsl: ${SMTP_USE_SSL:-false}
      BaseUrls__Gateway: ${BASE_URL_GATEWAY:-http://gateway:8080}
      BaseUrls__Api: ${BASE_URL_API:-http://api:8080}
      BaseUrls__Frontend: ${BASE_URL_FRONTEND:-http://frontend}
      GlobalConfiguration__BaseUrl: ${BASE_URL_GATEWAY:-http://gateway:8080}
      Routes__0__DownstreamHostAndPorts__0__Host: ${OCEL0_DOWNSTREAM_HOST:-api}
      Routes__0__DownstreamHostAndPorts__0__Port: ${OCEL0_DOWNSTREAM_PORT:-8080}
      Routes__1__DownstreamHostAndPorts__0__Host: ${OCEL1_DOWNSTREAM_HOST:-api}
      Routes__1__DownstreamHostAndPorts__0__Port: ${OCEL1_DOWNSTREAM_PORT:-8080}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "${GATEWAY_PORT:-5001}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qphising-frontend
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pgdata:
