name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore backend
        run: dotnet restore QPhising.slnx

      - name: Build backend
        run: dotnet build QPhising.slnx --no-restore --configuration Release

      - name: Run backend tests
        run: dotnet test backend/API.Tests/QPhising.Api.Tests.csproj --configuration Release --no-build

      - name: Verify EF migrations compile
        run: dotnet build backend/API/QPhising.Api.csproj --configuration Release /p:EFOptimizeContext=false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Swagger quality gate
        run: ./scripts/check-swagger-quality.sh ./frontend/openapi/proxy-validation.swagger.json

      - name: Validate proxy generation determinism
        run: ./scripts/validate-proxy-generation.sh

      - name: Verify gateway aligns to Swagger
        run: ./scripts/check-gateway-swagger-alignment.sh --swagger frontend/openapi/proxy-validation.swagger.json --ocelot backend/Gateway/ocelot.json

      - name: Verify frontend proxy operations are gateway-routable
        run: ./scripts/check-proxy-gateway-consistency.sh --ocelot backend/Gateway/ocelot.json --proxy-dir frontend/src/app/shared/proxy/services
