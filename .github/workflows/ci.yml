name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  QUALITY_MIN_BACKEND_LINE_COVERAGE: "70"
  SECURITY_FAIL_ON_DOTNET_SEVERITY: "high"
  SECURITY_FAIL_ON_NPM_SEVERITY: "high"
  SECURITY_FAIL_ON_TRIVY_SEVERITY: "HIGH,CRITICAL"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  restore:
    name: Restore dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Restore backend dependencies
        run: dotnet restore backend/QPhising.Backend.sln

      - name: Restore frontend dependencies
        run: npm ci
        working-directory: frontend

  build_backend:
    name: Build backend
    runs-on: ubuntu-latest
    needs: [restore]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build backend solution
        run: dotnet build backend/QPhising.Backend.sln --configuration Release --no-restore

  build_frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: [restore]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [build_backend, build_frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint frontend TypeScript
        run: npx tsc --noEmit -p tsconfig.app.json
        working-directory: frontend

      - name: Lint backend formatting
        run: dotnet format backend/QPhising.Backend.sln --verify-no-changes --severity warn

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Execute backend tests with coverage collection
        run: >-
          dotnet test backend/QPhising.Backend.sln
          --configuration Release
          --no-build
          --collect:"XPlat Code Coverage"
          --results-directory ./.artifacts/test-results

      - name: Generate backend coverage summary
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.*
          reportgenerator \
            "-reports:.artifacts/test-results/**/coverage.cobertura.xml" \
            "-targetdir:.artifacts/coverage-report" \
            "-reporttypes:TextSummary;JsonSummary"

      - name: Enforce backend line coverage threshold
        run: |
          python - <<'PYTHON'
          import json
          import os
          from pathlib import Path

          summary_path = Path('.artifacts/coverage-report/Summary.json')
          if not summary_path.exists():
              raise SystemExit('Coverage summary not found at .artifacts/coverage-report/Summary.json')

          summary = json.loads(summary_path.read_text())
          line_coverage = float(summary['summary']['linecoverage'])
          threshold = float(os.environ.get('QUALITY_MIN_BACKEND_LINE_COVERAGE', '70'))

          print(f'Backend line coverage: {line_coverage:.2f}%')
          print(f'Required minimum: {threshold:.2f}%')

          if line_coverage < threshold:
              raise SystemExit(
                  f'Coverage gate failed: backend line coverage {line_coverage:.2f}% is below {threshold:.2f}%'
              )
          PYTHON

      - name: Execute frontend test smoke build
        run: npm run build -- --configuration production
        working-directory: frontend

  security_scan:
    name: Security scan
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Check backend dependency vulnerabilities (JSON report)
        run: >-
          dotnet list backend/QPhising.Backend.sln package
          --vulnerable
          --include-transitive
          --format json > ./.artifacts-dotnet-vuln-report.json

      - name: Enforce backend dependency vulnerability policy
        run: |
          python - <<'PYTHON'
          import json
          import os
          from pathlib import Path

          report_path = Path('.artifacts-dotnet-vuln-report.json')
          if not report_path.exists():
              raise SystemExit('Missing .NET vulnerability report (.artifacts-dotnet-vuln-report.json)')

          minimum_severity = os.environ.get('SECURITY_FAIL_ON_DOTNET_SEVERITY', 'high').strip().lower()
          severity_rank = {'low': 1, 'moderate': 2, 'medium': 2, 'high': 3, 'critical': 4}

          if minimum_severity not in severity_rank:
              raise SystemExit(f'Unsupported SECURITY_FAIL_ON_DOTNET_SEVERITY: {minimum_severity}')

          payload = json.loads(report_path.read_text())
          threshold = severity_rank[minimum_severity]
          blocking = []

          for project in payload.get('projects', []):
              project_name = project.get('path') or project.get('name') or 'unknown-project'
              for framework in project.get('frameworks', []):
                  framework_name = framework.get('framework') or 'unknown-framework'
                  for package in framework.get('topLevelPackages', []) + framework.get('transitivePackages', []):
                      for vulnerability in package.get('vulnerabilities', []):
                          raw_severity = str(vulnerability.get('severity', 'unknown')).strip().lower()
                          if severity_rank.get(raw_severity, 0) >= threshold:
                              blocking.append(
                                  f"{project_name} [{framework_name}] {package.get('id')} {package.get('resolvedVersion')} => {raw_severity}"
                              )

          print(f'.NET blocking threshold: {minimum_severity}')
          print(f'.NET vulnerabilities meeting threshold: {len(blocking)}')

          if blocking:
              for issue in blocking:
                  print(f' - {issue}')
              raise SystemExit('Blocking .NET vulnerabilities detected')
          PYTHON

      - name: Check frontend dependency vulnerabilities
        run: npm audit --audit-level=${SECURITY_FAIL_ON_NPM_SEVERITY}
        working-directory: frontend

      - name: Build service images for vulnerability scanning
        run: docker compose build frontend api gateway worker

      - name: Scan service images with Trivy (policy-enforced)
        run: |
          set -euo pipefail
          for service in frontend api gateway worker; do
            image_id="$(docker compose images -q "${service}")"
            if [ -z "${image_id}" ]; then
              echo "No image id found for service ${service}"
              exit 1
            fi

            echo "Scanning service ${service} image ${image_id}"
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy:0.57.1 image \
              --scanners vuln \
              --severity "${SECURITY_FAIL_ON_TRIVY_SEVERITY}" \
              --ignore-unfixed \
              --exit-code 1 \
              "${image_id}"
          done

  container_build:
    name: Container build
    runs-on: ubuntu-latest
    needs: [security_scan]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build service images
        run: docker compose build frontend api gateway worker
