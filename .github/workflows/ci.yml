name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  QUALITY_MIN_BACKEND_LINE_COVERAGE: "70"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  restore:
    name: Restore dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Restore backend dependencies
        run: dotnet restore backend/QPhising.Backend.sln

      - name: Restore frontend dependencies
        run: npm ci
        working-directory: frontend

  build_backend:
    name: Build backend
    runs-on: ubuntu-latest
    needs: [restore]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build backend solution
        run: dotnet build backend/QPhising.Backend.sln --configuration Release --no-restore

  build_frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: [restore]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [build_backend, build_frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint frontend TypeScript
        run: npx tsc --noEmit -p tsconfig.app.json
        working-directory: frontend

      - name: Lint backend formatting
        run: dotnet format backend/QPhising.Backend.sln --verify-no-changes --severity warn

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Execute backend tests with coverage collection
        run: >-
          dotnet test backend/QPhising.Backend.sln
          --configuration Release
          --no-build
          --collect:"XPlat Code Coverage"
          --results-directory ./.artifacts/test-results

      - name: Generate backend coverage summary
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.*
          reportgenerator \
            "-reports:.artifacts/test-results/**/coverage.cobertura.xml" \
            "-targetdir:.artifacts/coverage-report" \
            "-reporttypes:TextSummary;JsonSummary"

      - name: Enforce backend line coverage threshold
        run: |
          python - <<'PYTHON'
          import json
          import os
          from pathlib import Path

          summary_path = Path('.artifacts/coverage-report/Summary.json')
          if not summary_path.exists():
              raise SystemExit('Coverage summary not found at .artifacts/coverage-report/Summary.json')

          summary = json.loads(summary_path.read_text())
          line_coverage = float(summary['summary']['linecoverage'])
          threshold = float(os.environ.get('QUALITY_MIN_BACKEND_LINE_COVERAGE', '70'))

          print(f'Backend line coverage: {line_coverage:.2f}%')
          print(f'Required minimum: {threshold:.2f}%')

          if line_coverage < threshold:
              raise SystemExit(
                  f'Coverage gate failed: backend line coverage {line_coverage:.2f}% is below {threshold:.2f}%'
              )
          PYTHON

      - name: Execute frontend test smoke build
        run: npm run build -- --configuration production
        working-directory: frontend

  security_scan:
    name: Security scan
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Check backend dependency vulnerabilities
        run: dotnet list backend/QPhising.Backend.sln package --vulnerable --include-transitive

      - name: Check frontend dependency vulnerabilities
        run: npm audit --audit-level=high
        working-directory: frontend

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: '1'

  container_build:
    name: Container build
    runs-on: ubuntu-latest
    needs: [security_scan]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build service images
        run: docker compose build frontend api gateway worker
