name: Proxy Generation Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-proxy-generation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate standardized Swagger proxy generation
        run: ./scripts/validate-proxy-generation.sh
